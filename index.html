<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Punto Frío Bocagrande — Licores, Cervezas y Bebidas</title>
<link rel="stylesheet" href="css/styles.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header class="header">
  <h1>🧊 Punto Frío Bocagrande</h1>
  <p>Licores · Cervezas · Bebidas — Entrega en Bocagrande</p>
</header>

<nav class="filtros" id="filtros"></nav>

<div class="toolbar-tienda">
  <select id="selector-orden">
    <option value="default">Ordenar por</option>
    <option value="precio-asc">Precio: menor a mayor</option>
    <option value="precio-desc">Precio: mayor a menor</option>
  </select>
</div>

<main class="grid-productos" id="grid-productos">
  <!-- Las tarjetas de producto se renderizan aquí en tiempo real -->
</main>

<!-- Botón flotante del carrito -->
<div class="carrito-flotante" id="btn-carrito">
  🛒 Ver pedido
  <span class="badge" id="badge-carrito">0</span>
</div>

<!-- Modal del carrito / checkout -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-carrito">
    <button class="btn-cerrar-modal" id="btn-cerrar-modal">✕</button>
    <h2>Tu pedido 🧊</h2>

    <div id="lista-carrito"></div>
    <div class="total-carrito" id="total-carrito">Total: $ 0</div>

    <form class="form-cliente" id="form-cliente">
      <input type="text" id="cliente-nombre" placeholder="Nombre completo" required />
      <input type="text" id="cliente-direccion" placeholder="Dirección / Hotel en Bocagrande" required />
      <input type="tel" id="cliente-telefono" placeholder="Teléfono (opcional)" />
      <button type="submit" class="btn-whatsapp">📲 Enviar pedido por WhatsApp</button>
    </form>
  </div>
</div>

<!-- Visor de fotos en grande (lightbox) -->
<div class="lightbox-overlay" id="lightbox-overlay">
  <button class="btn-cerrar-lightbox" id="btn-cerrar-lightbox">✕</button>
  <button class="lightbox-nav lightbox-prev" id="lightbox-prev">‹</button>
  <img id="lightbox-img" src="" alt="Foto del producto" />
  <button class="lightbox-nav lightbox-next" id="lightbox-next">›</button>
  <div class="lightbox-dots" id="lightbox-dots"></div>
</div>

<!-- Modal de detalle de producto: fotos + todos los precios/diferencias -->
<div class="modal-overlay-detalle" id="modal-detalle-overlay">
  <div class="modal-detalle-caja">
    <button class="btn-cerrar-modal-detalle" id="btn-cerrar-detalle">✕</button>
    <div id="detalle-producto-contenido"></div>
  </div>
</div>

<script type="module">
import {
  db,
  collection,
  onSnapshot,
  generarLinkWhatsApp
} from "./js/theme.js";

/* ⚠️ Reemplaza con el número de WhatsApp real del negocio (formato internacional sin +) */
const NUMERO_WHATSAPP_NEGOCIO = "57 317 7975567";

const CATEGORIAS = ["Todos", "Licores", "Cervezas Nacionales", "Importadas", "Bebidas", "Hielo"];

let productos = [];       // Cache local de productos desde Firestore
let categoriaActiva = "Todos";
let ordenActivo = "default";
let carrito = [];         // [{key, id, nombre, precio, cantidad, conEnvase}]
let envaseSeleccionado = {}; // { [productoId]: boolean } — elección del cliente antes de agregar
let modoVentaSeleccionado = {}; // { [productoId]: "caja" | "suelta" } — solo aplica si permiteVentaSuelta y mostrarSueltaEnTienda
let imagenActiva = {};       // { [productoId]: indice de la foto que se está mostrando }

const gridEl = document.getElementById("grid-productos");
const filtrosEl = document.getElementById("filtros");
const selectorOrdenEl = document.getElementById("selector-orden");
const badgeEl = document.getElementById("badge-carrito");
const modalOverlay = document.getElementById("modal-overlay");
const listaCarritoEl = document.getElementById("lista-carrito");
const totalCarritoEl = document.getElementById("total-carrito");

selectorOrdenEl.addEventListener("change", (e) => {
  ordenActivo = e.target.value;
  renderProductos();
});

function imagenesDe(p) {
  if (Array.isArray(p.imagenes) && p.imagenes.length) return p.imagenes;
  if (p.imagen) return [p.imagen];
  return [];
}

/**
 * Calcula toda la info de precio para un producto según el modo (caja/suelta).
 * El envase ahora aplica tanto si se compra por caja completa como por unidad suelta.
 */
function calcularPrecioInfo(p, modo) {
  const esCajaProducto = !!p.manejaCaja;
  const esCaja = !esCajaProducto || modo !== "suelta";
  const unidadesPorCaja = Number(p.unidadesPorCaja) || 1;
  const envaseAplica = !!p.manejaEnvase;

  let precioSin, precioCon;
  if (esCaja) {
    precioSin = Number(p.precio) || 0;
    precioCon = envaseAplica ? Number(p.precioConEnvase ?? p.precio) || 0 : precioSin;
  } else {
    precioSin = Number(p.precioUnidadSuelta ?? p.precio) || 0;
    if (envaseAplica) {
      // Traslada la diferencia con/sin envase de la caja completa a la unidad suelta, proporcionalmente
      const diffPorUnidad = ((Number(p.precio) || 0) - (Number(p.precioConEnvase ?? p.precio) || 0)) / unidadesPorCaja;
      precioCon = Math.max(0, Math.round((precioSin - diffPorUnidad) / 50) * 50);
    } else {
      precioCon = precioSin;
    }
  }

  return { esCaja, envaseAplica, precioSin, precioCon };
}

/* ---------- LIGHTBOX (visor de fotos en grande) ---------- */
const lightboxOverlay = document.getElementById("lightbox-overlay");
const lightboxImg = document.getElementById("lightbox-img");
const lightboxDots = document.getElementById("lightbox-dots");
let lightboxImagenes = [];
let lightboxIndex = 0;

function abrirLightbox(imgs, indiceInicial) {
  lightboxImagenes = imgs;
  lightboxIndex = indiceInicial || 0;
  renderLightbox();
  lightboxOverlay.classList.add("abierto");
}

function renderLightbox() {
  lightboxImg.src = lightboxImagenes[lightboxIndex];
  const mostrarNav = lightboxImagenes.length > 1;
  document.getElementById("lightbox-prev").style.display = mostrarNav ? "flex" : "none";
  document.getElementById("lightbox-next").style.display = mostrarNav ? "flex" : "none";
  lightboxDots.innerHTML = mostrarNav
    ? lightboxImagenes
        .map((_, i) => `<span class="dot ${i === lightboxIndex ? "activo" : ""}" data-idx="${i}"></span>`)
        .join("")
    : "";
  lightboxDots.querySelectorAll(".dot").forEach((dot) => {
    dot.addEventListener("click", () => {
      lightboxIndex = Number(dot.dataset.idx);
      renderLightbox();
    });
  });
}

document.getElementById("btn-cerrar-lightbox").addEventListener("click", () => {
  lightboxOverlay.classList.remove("abierto");
});
lightboxOverlay.addEventListener("click", (e) => {
  if (e.target === lightboxOverlay) lightboxOverlay.classList.remove("abierto");
});
document.getElementById("lightbox-prev").addEventListener("click", (e) => {
  e.stopPropagation();
  lightboxIndex = (lightboxIndex - 1 + lightboxImagenes.length) % lightboxImagenes.length;
  renderLightbox();
});
document.getElementById("lightbox-next").addEventListener("click", (e) => {
  e.stopPropagation();
  lightboxIndex = (lightboxIndex + 1) % lightboxImagenes.length;
  renderLightbox();
});
document.addEventListener("keydown", (e) => {
  if (!lightboxOverlay.classList.contains("abierto")) return;
  if (e.key === "Escape") lightboxOverlay.classList.remove("abierto");
  if (e.key === "ArrowLeft") document.getElementById("lightbox-prev").click();
  if (e.key === "ArrowRight") document.getElementById("lightbox-next").click();
});

// Delegado: clic en la imagen de un producto abre el detalle completo (fotos + precios)
gridEl.addEventListener("click", (e) => {
  if (e.target.classList.contains("dot")) return; // los puntos ya cambian de foto por su cuenta
  const wrap = e.target.closest(".imagen-wrap");
  if (!wrap) return;
  abrirDetalleProducto(wrap.dataset.id);
});

/* ---------- RENDER DE FILTROS ---------- */
function renderFiltros() {
  filtrosEl.innerHTML = CATEGORIAS.map(
    (cat) => `<button class="filtro-btn ${cat === categoriaActiva ? "activo" : ""}" data-cat="${cat}">${cat}</button>`
  ).join("");

  filtrosEl.querySelectorAll(".filtro-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      categoriaActiva = btn.dataset.cat;
      renderFiltros();
      renderProductos();
    });
  });
}

/* ---------- RENDER DE PRODUCTOS (reactivo) ---------- */
function renderProductos() {
  let lista = productos.filter((p) => p.visibleEnTienda !== false);

  if (categoriaActiva !== "Todos") {
    lista = lista.filter((p) => p.categoria === categoriaActiva);
  }

  if (ordenActivo === "precio-asc") {
    lista = [...lista].sort((a, b) => Number(a.precio) - Number(b.precio));
  } else if (ordenActivo === "precio-desc") {
    lista = [...lista].sort((a, b) => Number(b.precio) - Number(a.precio));
  }

  if (lista.length === 0) {
    gridEl.innerHTML = `<p style="grid-column:1/-1;text-align:center;color:#999;padding:30px;">No hay productos en esta categoría.</p>`;
    return;
  }

  gridEl.innerHTML = lista
    .map((p) => {
      const stockUnidades = Number(p.stock) || 0;
      const agotadoTotal = stockUnidades <= 0;
      const conEnvase = !!envaseSeleccionado[p.id];

      const esCajaProducto = !!p.manejaCaja;
      const unidadesPorCaja = Number(p.unidadesPorCaja) || 1;
      const permiteSueltaTienda = esCajaProducto && !!p.permiteVentaSuelta && !!p.mostrarSueltaEnTienda;
      const modoActual = permiteSueltaTienda ? (modoVentaSeleccionado[p.id] || "caja") : "caja";
      const esCajaSeleccionada = !esCajaProducto || modoActual === "caja";

      const infoPrecio = calcularPrecioInfo(p, modoActual);
      const precioMostrado = conEnvase ? infoPrecio.precioCon : infoPrecio.precioSin;

      const cajasDisponibles = esCajaProducto ? Math.floor(stockUnidades / unidadesPorCaja) : null;
      const disponibleModoActual = esCajaProducto ? (esCajaSeleccionada ? cajasDisponibles : stockUnidades) : stockUnidades;
      const sinStockModoActual = disponibleModoActual <= 0;

      let stockTexto;
      if (esCajaProducto) {
        stockTexto = esCajaSeleccionada
          ? (cajasDisponibles > 0 ? `Disponibles: ${cajasDisponibles} caja(s)` : "Sin cajas completas")
          : (stockUnidades > 0 ? `Disponibles: ${stockUnidades} unidad(es)` : "Sin stock");
      } else {
        stockTexto = agotadoTotal ? "Sin stock" : `Disponibles: ${p.stock}`;
      }

      const imgs = imagenesDe(p);
      const idxActivo = (imagenActiva[p.id] || 0) % Math.max(imgs.length, 1);
      const imgSrc = imgs.length ? imgs[idxActivo] : "https://placehold.co/300x200/FFF3CD/999999?text=Sin+imagen";

      return `
      <div class="card-producto">
        <div class="imagen-wrap" data-id="${p.id}">
          <img src="${imgSrc}" alt="${p.nombre}" loading="lazy" />
          ${agotadoTotal ? `<span class="badge-agotado">Agotado</span>` : ""}
          ${
            imgs.length > 1
              ? `<div class="galeria-dots">${imgs
                  .map((_, i) => `<span class="dot ${i === idxActivo ? "activo" : ""}" data-idx="${i}"></span>`)
                  .join("")}</div>`
              : ""
          }
        </div>
        <div class="info">
          ${p.mostrarCategoria !== false ? `<span class="categoria">${p.categoria || ""}</span>` : ""}
          <span class="nombre">${p.nombre}</span>
          <span class="precio">${formatCOPLocal(precioMostrado)}</span>
          ${
            permiteSueltaTienda
              ? `<div class="selector-modo-venta" data-id="${p.id}">
                   <label><input type="radio" name="modo-${p.id}" value="caja" ${modoActual === "caja" ? "checked" : ""} /> Caja completa (${unidadesPorCaja} uds) — ${formatCOPLocal(p.precio)}</label>
                   <label><input type="radio" name="modo-${p.id}" value="suelta" ${modoActual === "suelta" ? "checked" : ""} /> Unidad suelta — ${formatCOPLocal(p.precioUnidadSuelta)}</label>
                 </div>`
              : (esCajaProducto ? `<span class="categoria" style="color:#1565C0;">Caja x${unidadesPorCaja}</span>` : "")
          }
          ${
            infoPrecio.envaseAplica
              ? `<div class="selector-envase" data-id="${p.id}">
                   <label><input type="radio" name="envase-${p.id}" value="con" ${conEnvase ? "checked" : ""} /> Traigo envase — ${formatCOPLocal(infoPrecio.precioCon)}</label>
                   <label><input type="radio" name="envase-${p.id}" value="sin" ${!conEnvase ? "checked" : ""} /> Sin envase — ${formatCOPLocal(infoPrecio.precioSin)} <span class="nota-envase">(+${formatCOPLocal(Math.max(0, infoPrecio.precioSin - infoPrecio.precioCon))})</span></label>
                 </div>`
              : ""
          }
          <span class="stock-info">${stockTexto}</span>
          <button class="btn-agregar ${sinStockModoActual ? "agotado" : ""}" data-id="${p.id}" ${sinStockModoActual ? "disabled" : ""}>
            ${sinStockModoActual ? "Agotado" : "Agregar"}
          </button>
        </div>
      </div>`;
    })
    .join("");

  gridEl.querySelectorAll(".imagen-wrap .dot").forEach((dot) => {
    dot.addEventListener("click", (e) => {
      e.stopPropagation();
      const id = dot.closest(".imagen-wrap").dataset.id;
      imagenActiva[id] = Number(dot.dataset.idx);
      renderProductos();
    });
  });

  gridEl.querySelectorAll(".selector-envase").forEach((sel) => {
    sel.querySelectorAll("input[type=radio]").forEach((radio) => {
      radio.addEventListener("change", (e) => {
        envaseSeleccionado[sel.dataset.id] = e.target.value === "con";
        renderProductos();
      });
    });
  });

  gridEl.querySelectorAll(".selector-modo-venta").forEach((sel) => {
    sel.querySelectorAll("input[type=radio]").forEach((radio) => {
      radio.addEventListener("change", (e) => {
        modoVentaSeleccionado[sel.dataset.id] = e.target.value;
        renderProductos();
      });
    });
  });

  gridEl.querySelectorAll(".btn-agregar:not(.agotado)").forEach((btn) => {
    btn.addEventListener("click", () => agregarAlCarrito(btn.dataset.id));
  });
}

function formatCOPLocal(v) {
  return "$ " + (Number(v) || 0).toLocaleString("es-CO");
}

/* ---------- MODAL DE DETALLE DE PRODUCTO ---------- */
const modalDetalleOverlay = document.getElementById("modal-detalle-overlay");
const detalleContenidoEl = document.getElementById("detalle-producto-contenido");

function abrirDetalleProducto(id) {
  renderDetalleProducto(id);
  modalDetalleOverlay.classList.add("abierto");
}

function renderDetalleProducto(id) {
  const p = productos.find((x) => x.id === id);
  if (!p) {
    modalDetalleOverlay.classList.remove("abierto");
    return;
  }

  const stockUnidades = Number(p.stock) || 0;
  const agotadoTotal = stockUnidades <= 0;
  const conEnvase = !!envaseSeleccionado[id];

  const esCajaProducto = !!p.manejaCaja;
  const unidadesPorCaja = Number(p.unidadesPorCaja) || 1;
  const permiteSueltaTienda = esCajaProducto && !!p.permiteVentaSuelta && !!p.mostrarSueltaEnTienda;
  const modoActual = permiteSueltaTienda ? (modoVentaSeleccionado[id] || "caja") : "caja";
  const esCajaSeleccionada = !esCajaProducto || modoActual === "caja";

  const infoPrecio = calcularPrecioInfo(p, modoActual);
  const precioMostrado = conEnvase ? infoPrecio.precioCon : infoPrecio.precioSin;

  const cajasDisponibles = esCajaProducto ? Math.floor(stockUnidades / unidadesPorCaja) : null;
  const disponibleModoActual = esCajaProducto ? (esCajaSeleccionada ? cajasDisponibles : stockUnidades) : stockUnidades;
  const sinStockModoActual = disponibleModoActual <= 0;

  // Tabla resumen con TODAS las combinaciones de precio disponibles para este producto
  const filasPrecio = [];
  if (esCajaProducto) {
    const infoCaja = calcularPrecioInfo(p, "caja");
    filasPrecio.push([`Caja completa (${unidadesPorCaja} uds)${infoCaja.envaseAplica ? " — sin envase" : ""}`, infoCaja.precioSin]);
    if (infoCaja.envaseAplica) filasPrecio.push(["Caja completa — trayendo envases", infoCaja.precioCon]);
    if (permiteSueltaTienda) {
      const infoSuelta = calcularPrecioInfo(p, "suelta");
      filasPrecio.push([`Unidad suelta${infoSuelta.envaseAplica ? " — sin envase" : ""}`, infoSuelta.precioSin]);
      if (infoSuelta.envaseAplica) filasPrecio.push(["Unidad suelta — trayendo envase", infoSuelta.precioCon]);
    }
  } else {
    filasPrecio.push([infoPrecio.envaseAplica ? "Sin envase" : "Precio", infoPrecio.precioSin]);
    if (infoPrecio.envaseAplica) filasPrecio.push(["Trayendo envase", infoPrecio.precioCon]);
  }

  const imgs = imagenesDe(p);
  const idxActivo = (imagenActiva[id] || 0) % Math.max(imgs.length, 1);
  const imgSrc = imgs.length ? imgs[idxActivo] : "https://placehold.co/500x350/FFF3CD/999999?text=Sin+imagen";

  detalleContenidoEl.innerHTML = `
    <div class="detalle-imagen-wrap" data-id="${id}">
      <img src="${imgSrc}" alt="${p.nombre}" />
      ${agotadoTotal ? `<span class="badge-agotado">Agotado</span>` : ""}
      ${
        imgs.length > 1
          ? `<div class="galeria-dots">${imgs
              .map((_, i) => `<span class="dot ${i === idxActivo ? "activo" : ""}" data-idx="${i}"></span>`)
              .join("")}</div>`
          : ""
      }
    </div>
    <div class="detalle-info">
      ${p.mostrarCategoria !== false ? `<span class="categoria">${p.categoria || ""}</span>` : ""}
      <h2 class="detalle-nombre">${p.nombre}</h2>
      <span class="precio">${formatCOPLocal(precioMostrado)}</span>

      <table class="tabla-precios-detalle">
        ${filasPrecio.map(([etiqueta, valor]) => `<tr><td>${etiqueta}</td><td>${formatCOPLocal(valor)}</td></tr>`).join("")}
      </table>

      ${
        permiteSueltaTienda
          ? `<div class="selector-modo-venta" data-id="${id}">
               <label><input type="radio" name="modo-detalle-${id}" value="caja" ${modoActual === "caja" ? "checked" : ""} /> Caja completa (${unidadesPorCaja} uds)</label>
               <label><input type="radio" name="modo-detalle-${id}" value="suelta" ${modoActual === "suelta" ? "checked" : ""} /> Unidad suelta</label>
             </div>`
          : ""
      }
      ${
        infoPrecio.envaseAplica
          ? `<div class="selector-envase" data-id="${id}">
               <label><input type="radio" name="envase-detalle-${id}" value="con" ${conEnvase ? "checked" : ""} /> Traigo envase — ${formatCOPLocal(infoPrecio.precioCon)}</label>
               <label><input type="radio" name="envase-detalle-${id}" value="sin" ${!conEnvase ? "checked" : ""} /> Sin envase — ${formatCOPLocal(infoPrecio.precioSin)} <span class="nota-envase">(+${formatCOPLocal(Math.max(0, infoPrecio.precioSin - infoPrecio.precioCon))})</span></label>
             </div>`
          : ""
      }
      <span class="stock-info">${sinStockModoActual ? "Sin stock en este modo" : `Disponibles: ${esCajaProducto ? (esCajaSeleccionada ? cajasDisponibles + " caja(s)" : stockUnidades + " unidad(es)") : p.stock}`}</span>
      <button class="btn-agregar ${sinStockModoActual ? "agotado" : ""}" id="btn-agregar-detalle" data-id="${id}" ${sinStockModoActual ? "disabled" : ""}>
        ${sinStockModoActual ? "Agotado" : "Agregar al pedido"}
      </button>
    </div>
  `;

  // Fotos: puntos y clic para ampliar (lightbox)
  detalleContenidoEl.querySelectorAll(".galeria-dots .dot").forEach((dot) => {
    dot.addEventListener("click", (e) => {
      e.stopPropagation();
      imagenActiva[id] = Number(dot.dataset.idx);
      renderDetalleProducto(id);
      renderProductos();
    });
  });
  const imgDetalle = detalleContenidoEl.querySelector(".detalle-imagen-wrap img");
  if (imgDetalle && imgs.length) {
    imgDetalle.addEventListener("click", () => abrirLightbox(imgs, idxActivo));
  }

  detalleContenidoEl.querySelectorAll(".selector-modo-venta input[type=radio]").forEach((radio) => {
    radio.addEventListener("change", (e) => {
      modoVentaSeleccionado[id] = e.target.value;
      renderDetalleProducto(id);
      renderProductos();
    });
  });

  detalleContenidoEl.querySelectorAll(".selector-envase input[type=radio]").forEach((radio) => {
    radio.addEventListener("change", (e) => {
      envaseSeleccionado[id] = e.target.value === "con";
      renderDetalleProducto(id);
      renderProductos();
    });
  });

  const btnAgregarDetalle = document.getElementById("btn-agregar-detalle");
  if (btnAgregarDetalle && !btnAgregarDetalle.disabled) {
    btnAgregarDetalle.addEventListener("click", () => {
      agregarAlCarrito(id);
      modalDetalleOverlay.classList.remove("abierto");
    });
  }
}

document.getElementById("btn-cerrar-detalle").addEventListener("click", () => {
  modalDetalleOverlay.classList.remove("abierto");
});
modalDetalleOverlay.addEventListener("click", (e) => {
  if (e.target === modalDetalleOverlay) modalDetalleOverlay.classList.remove("abierto");
});

/* ---------- SUSCRIPCIÓN EN TIEMPO REAL A FIRESTORE ---------- */
onSnapshot(collection(db, "productos"), (snapshot) => {
  productos = snapshot.docs.map((d) => ({ id: d.id, ...d.data() }));
  renderProductos();
  sincronizarCarritoConStock();
});

/* Si el stock cambia mientras el producto está en el carrito, ajustamos cantidades */
function sincronizarCarritoConStock() {
  let cambiado = false;

  // El stock siempre se mide en UNIDADES. Cada item consume item.cantidad * factorConsumo unidades reales
  // (factorConsumo = unidadesPorCaja si es caja completa, 1 si es unidad suelta o producto normal).
  const unidadesUsadasPorProducto = {};

  carrito = carrito
    .map((item) => {
      const actual = productos.find((p) => p.id === item.id);
      if (!actual) return item;
      const stockUnidades = Number(actual.stock) || 0;
      if (stockUnidades <= 0) {
        cambiado = true;
        return null;
      }
      const factor = item.factorConsumo || 1;
      const usadoPrevio = unidadesUsadasPorProducto[item.id] || 0;
      const disponibleUnidades = stockUnidades - usadoPrevio;
      const maxCantidad = Math.floor(disponibleUnidades / factor);
      if (item.cantidad > maxCantidad) {
        item.cantidad = Math.max(0, maxCantidad);
        cambiado = true;
      }
      unidadesUsadasPorProducto[item.id] = usadoPrevio + item.cantidad * factor;
      return item.cantidad > 0 ? item : null;
    })
    .filter(Boolean);

  if (cambiado) {
    actualizarBadge();
    renderCarrito();
  }
}

/* ---------- CARRITO ---------- */
function agregarAlCarrito(id) {
  const producto = productos.find((p) => p.id === id);
  const stockUnidades = Number(producto?.stock) || 0;
  if (!producto || stockUnidades <= 0) return;

  const esCajaProducto = !!producto.manejaCaja;
  const unidadesPorCaja = Number(producto.unidadesPorCaja) || 1;
  const permiteSueltaTienda = esCajaProducto && !!producto.permiteVentaSuelta && !!producto.mostrarSueltaEnTienda;
  const modoActual = permiteSueltaTienda ? (modoVentaSeleccionado[id] || "caja") : "caja";
  const factorConsumo = esCajaProducto ? (modoActual === "caja" ? unidadesPorCaja : 1) : 1;

  const infoPrecio = calcularPrecioInfo(producto, modoActual);
  const conEnvase = infoPrecio.envaseAplica ? !!envaseSeleccionado[id] : false;
  const precioUnit = conEnvase ? infoPrecio.precioCon : infoPrecio.precioSin;

  const key = id + (esCajaProducto ? (infoPrecio.esCaja ? "_caja" : "_suelta") : "") + (conEnvase ? "_con" : "_sin");

  const unidadesUsadas = carrito
    .filter((i) => i.id === id)
    .reduce((acc, i) => acc + i.cantidad * (i.factorConsumo || 1), 0);
  if (unidadesUsadas + factorConsumo > stockUnidades) return; // sin stock suficiente

  const existente = carrito.find((i) => i.key === key);
  if (existente) {
    existente.cantidad++;
  } else {
    carrito.push({
      key,
      id,
      nombre: producto.nombre,
      precio: precioUnit,
      cantidad: 1,
      conEnvase: infoPrecio.envaseAplica ? conEnvase : null,
      esCaja: esCajaProducto ? infoPrecio.esCaja : null,
      unidadesPorCaja: esCajaProducto ? unidadesPorCaja : null,
      factorConsumo
    });
  }
  actualizarBadge();
}

function actualizarBadge() {
  const totalItems = carrito.reduce((acc, i) => acc + i.cantidad, 0);
  badgeEl.textContent = totalItems;
}

function renderCarrito() {
  if (carrito.length === 0) {
    listaCarritoEl.innerHTML = `<div class="vacio-carrito">Tu carrito está vacío 🧊</div>`;
    totalCarritoEl.textContent = "Total: $ 0";
    return;
  }

  listaCarritoEl.innerHTML = carrito
    .map(
      (item) => `
      <div class="item-carrito" data-key="${item.key}">
        <div>
          <strong>${item.nombre}</strong>${
            item.esCaja === true ? ` <small style="color:#1565C0;">(caja x${item.unidadesPorCaja})</small>` :
            item.esCaja === false ? ` <small style="color:#1565C0;">(unidad suelta)</small>` : ""
          }<br/>
          <small>${formatCOPLocal(item.precio)} c/u</small>
          ${
            item.conEnvase !== null
              ? `<label style="display:flex;align-items:center;gap:5px;font-size:0.75rem;margin-top:4px;cursor:pointer;">
                   <input type="checkbox" class="chk-envase-carrito" data-key="${item.key}" ${item.conEnvase ? "checked" : ""} />
                   Traigo envase
                 </label>`
              : ""
          }
        </div>
        <div class="cantidad-control">
          <button class="restar">−</button>
          <span>${item.cantidad}</span>
          <button class="sumar">+</button>
        </div>
      </div>`
    )
    .join("");

  listaCarritoEl.querySelectorAll(".chk-envase-carrito").forEach((chk) => {
    chk.addEventListener("change", () => {
      const item = carrito.find((i) => i.key === chk.dataset.key);
      if (!item) return;
      const producto = productos.find((p) => p.id === item.id);
      if (!producto) return;

      const modo = item.esCaja === false ? "suelta" : "caja";
      const infoPrecio = calcularPrecioInfo(producto, modo);
      const nuevoConEnvase = chk.checked;
      const nuevoPrecio = nuevoConEnvase ? infoPrecio.precioCon : infoPrecio.precioSin;
      const nuevaKey = item.id + (item.esCaja === true ? "_caja" : item.esCaja === false ? "_suelta" : "") + (nuevoConEnvase ? "_con" : "_sin");

      const hermana = carrito.find((i) => i.key === nuevaKey && i !== item);
      if (hermana) {
        // Ya existe una línea de este producto+modo con ese envase: se fusionan las cantidades
        hermana.cantidad += item.cantidad;
        carrito = carrito.filter((i) => i !== item);
      } else {
        item.conEnvase = nuevoConEnvase;
        item.precio = nuevoPrecio;
        item.key = nuevaKey;
      }
      actualizarBadge();
      renderCarrito();
    });
  });

  listaCarritoEl.querySelectorAll(".item-carrito").forEach((el) => {
    const key = el.dataset.key;
    el.querySelector(".sumar").addEventListener("click", () => {
      const item = carrito.find((i) => i.key === key);
      const producto = productos.find((p) => p.id === item.id);
      const stockDisponible = Number(producto?.stock) || 0;
      const factor = item.factorConsumo || 1;
      const unidadesUsadas = carrito.filter((i) => i.id === item.id).reduce((acc, i) => acc + i.cantidad * (i.factorConsumo || 1), 0);
      if (item && unidadesUsadas + factor <= stockDisponible) item.cantidad++;
      actualizarBadge();
      renderCarrito();
    });
    el.querySelector(".restar").addEventListener("click", () => {
      const item = carrito.find((i) => i.key === key);
      if (item) item.cantidad--;
      carrito = carrito.filter((i) => i.cantidad > 0);
      actualizarBadge();
      renderCarrito();
    });
  });

  const total = carrito.reduce((acc, i) => acc + i.cantidad * i.precio, 0);
  totalCarritoEl.textContent = "Total: " + formatCOPLocal(total);
}

/* ---------- MODAL ---------- */
document.getElementById("btn-carrito").addEventListener("click", () => {
  renderCarrito();
  modalOverlay.classList.add("abierto");
});
document.getElementById("btn-cerrar-modal").addEventListener("click", () => {
  modalOverlay.classList.remove("abierto");
});
modalOverlay.addEventListener("click", (e) => {
  if (e.target === modalOverlay) modalOverlay.classList.remove("abierto");
});

/* ---------- ENVÍO POR WHATSAPP ---------- */
document.getElementById("form-cliente").addEventListener("submit", (e) => {
  e.preventDefault();
  if (carrito.length === 0) {
    alert("Tu carrito está vacío.");
    return;
  }

  const cliente = {
    nombre: document.getElementById("cliente-nombre").value.trim(),
    direccion: document.getElementById("cliente-direccion").value.trim(),
    telefono: document.getElementById("cliente-telefono").value.trim()
  };

  const url = generarLinkWhatsApp(carrito, cliente, NUMERO_WHATSAPP_NEGOCIO);
  window.open(url, "_blank");

  // Limpiar carrito después de enviar
  carrito = [];
  actualizarBadge();
  renderCarrito();
  modalOverlay.classList.remove("abierto");
});

/* ---------- INICIO ---------- */
renderFiltros();
</script>
