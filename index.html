let idioma = localStorage.getItem("pf-idioma") || "es";

function t(clave, vars) {
  let texto = (I18N[idioma] && I18N[idioma][clave]) || I18N.es[clave] || clave;
  if (vars) Object.keys(vars).forEach((k) => { texto = texto.replace("{" + k + "}", vars[k]); });
  return texto;
}

function aplicarIdioma() {
  document.documentElement.lang = idioma;
  document.querySelectorAll("[data-i18n]").forEach((el) => { el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll("[data-i18n-placeholder]").forEach((el) => { el.placeholder = t(el.dataset.i18nPlaceholder); });
  document.getElementById("btn-idioma").textContent = idioma === "es" ? "🇬🇧 EN" : "🇨🇴 ES";
  localStorage.setItem("pf-idioma", idioma);
  renderFiltros();
  renderProductos();
  renderCombosTienda();
  renderCarrito();
  renderMediosPagoTienda();
  evaluarEstadoTienda();
}
document.getElementById("btn-idioma").addEventListener("click", () => {
  idioma = idioma === "es" ? "en" : "es";
  aplicarIdioma();
});

let categorias = ["Todos"]; // se llena en tiempo real desde Firestore (colección "categorias")

let productos = [];       // Cache local de productos desde Firestore
let categoriaActiva = "Todos";
let ordenActivo = "default";
let textoBusqueda = "";
let carrito = [];         // [{key, id, nombre, precio, cantidad, conEnvase}]
let envaseSeleccionado = {}; // { [productoId]: boolean } — elección del cliente antes de agregar
let modoVentaSeleccionado = {}; // { [productoId]: "caja" | "suelta" } — solo aplica si permiteVentaSuelta y mostrarSueltaEnTienda
let imagenActiva = {};       // { [productoId]: indice de la foto que se está mostrando }

const gridEl = document.getElementById("grid-productos");
const filtrosEl = document.getElementById("filtros");
const selectorOrdenEl = document.getElementById("selector-orden");
const buscadorEl = document.getElementById("buscador-productos");
const badgeEl = document.getElementById("badge-carrito");
const modalOverlay = document.getElementById("modal-overlay");
const listaCarritoEl = document.getElementById("lista-carrito");
const totalCarritoEl = document.getElementById("total-carrito");

selectorOrdenEl.addEventListener("change", (e) => {
  ordenActivo = e.target.value;
  renderProductos();
});

let timeoutBusqueda = null;
buscadorEl.addEventListener("input", (e) => {
  clearTimeout(timeoutBusqueda);
  const valor = e.target.value;
  timeoutBusqueda = setTimeout(() => {
    textoBusqueda = valor.trim().toLowerCase();
    renderProductos();
  }, 200);
});

function imagenesDe(p) {
  if (Array.isArray(p.imagenes) && p.imagenes.length) return p.imagenes;
  if (p.imagen) return [p.imagen];
  return [];
}

/**
 * Calcula toda la info de precio para un producto según el modo (caja/sixpack/suelta).
 * El envase solo aplica comprando la caja completa (nunca por six pack ni por unidad suelta).
 */
function calcularPrecioInfo(p, modo) {
  const esCajaProducto = !!p.manejaCaja;
  const modoReal = esCajaProducto ? modo || "caja" : "caja";
  const envaseAplica = !!p.manejaEnvase && modoReal === "caja";

  let precioSin, precioCon;
  if (modoReal === "sixpack") {
    precioSin = Number(p.precioSixpack ?? p.precio) || 0;
    precioCon = precioSin;
  } else if (modoReal === "suelta") {
    precioSin = Number(p.precioUnidadSuelta ?? p.precio) || 0;
    precioCon = precioSin;
  } else {
    precioSin = Number(p.precio) || 0;
    precioCon = envaseAplica ? Number(p.precioConEnvase ?? p.precio) || 0 : precioSin;
  }

  return { modo: modoReal, envaseAplica, precioSin, precioCon };
}

/* ---------- LIGHTBOX (visor de fotos en grande) ---------- */
const lightboxOverlay = document.getElementById("lightbox-overlay");
const lightboxImg = document.getElementById("lightbox-img");
const lightboxDots = document.getElementById("lightbox-dots");
let lightboxImagenes = [];
let lightboxIndex = 0;

function abrirLightbox(imgs, indiceInicial) {
  lightboxImagenes = imgs;
  lightboxIndex = indiceInicial || 0;
  renderLightbox();
  lightboxOverlay.classList.add("abierto");
}

function renderLightbox() {
  lightboxImg.src = lightboxImagenes[lightboxIndex];
  const mostrarNav = lightboxImagenes.length > 1;
  document.getElementById("lightbox-prev").style.display = mostrarNav ? "flex" : "none";
  document.getElementById("lightbox-next").style.display = mostrarNav ? "flex" : "none";
  lightboxDots.innerHTML = mostrarNav
    ? lightboxImagenes
        .map((_, i) => `<span class="dot ${i === lightboxIndex ? "activo" : ""}" data-idx="${i}"></span>`)
        .join("")
    : "";
  lightboxDots.querySelectorAll(".dot").forEach((dot) => {
    dot.addEventListener("click", () => {
      lightboxIndex = Number(dot.dataset.idx);
      renderLightbox();
    });
  });
}

document.getElementById("btn-cerrar-lightbox").addEventListener("click", () => {
  lightboxOverlay.classList.remove("abierto");
});
lightboxOverlay.addEventListener("click", (e) => {
  if (e.target === lightboxOverlay) lightboxOverlay.classList.remove("abierto");
});
document.getElementById("lightbox-prev").addEventListener("click", (e) => {
  e.stopPropagation();
  lightboxIndex = (lightboxIndex - 1 + lightboxImagenes.length) % lightboxImagenes.length;
  renderLightbox();
});
document.getElementById("lightbox-next").addEventListener("click", (e) => {
  e.stopPropagation();
  lightboxIndex = (lightboxIndex + 1) % lightboxImagenes.length;
  renderLightbox();
});
document.addEventListener("keydown", (e) => {
  if (!lightboxOverlay.classList.contains("abierto")) return;
  if (e.key === "Escape") lightboxOverlay.classList.remove("abierto");
  if (e.key === "ArrowLeft") document.getElementById("lightbox-prev").click();
  if (e.key === "ArrowRight") document.getElementById("lightbox-next").click();
});

// Delegado: clic en la imagen de un producto abre el detalle completo (fotos + precios)
gridEl.addEventListener("click", (e) => {
  if (e.target.classList.contains("dot")) return; // los puntos ya cambian de foto por su cuenta
  const wrap = e.target.closest(".imagen-wrap");
  if (!wrap) return;
  abrirDetalleProducto(wrap.dataset.id);
});

/* ---------- RENDER DE FILTROS ---------- */
function renderFiltros() {
  filtrosEl.innerHTML = categorias.map(
    (cat) => `<button class="filtro-btn ${cat === categoriaActiva ? "activo" : ""}" data-cat="${cat}">${cat === "Todos" ? t("todos") : cat}</button>`
  ).join("");

  filtrosEl.querySelectorAll(".filtro-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      categoriaActiva = btn.dataset.cat;
      renderFiltros();
      renderProductos();
    });
  });
}

/* ---------- RENDER DE PRODUCTOS (reactivo) ---------- */
function renderProductos() {
  let lista = productos.filter((p) => p.visibleEnTienda !== false);

  if (categoriaActiva !== "Todos") {
    lista = lista.filter((p) => p.categoria === categoriaActiva);
  }

  if (textoBusqueda) {
    lista = lista.filter((p) => (p.nombre || "").toLowerCase().includes(textoBusqueda));
  }

  if (ordenActivo === "precio-asc") {
    lista = [...lista].sort((a, b) => Number(a.precio) - Number(b.precio));
  } else if (ordenActivo === "precio-desc") {
    lista = [...lista].sort((a, b) => Number(b.precio) - Number(a.precio));
  }

  if (lista.length === 0) {
    gridEl.innerHTML = `<p style="grid-column:1/-1;text-align:center;color:#999;padding:30px;">${t("sin_productos_categoria")}</p>`;
    return;
  }

  gridEl.innerHTML = lista
    .map((p) => {
      const stockUnidades = Number(p.stock) || 0;
      const agotadoTotal = stockUnidades <= 0;
      const conEnvase = !!envaseSeleccionado[p.id];

      const esCajaProducto = !!p.manejaCaja;
      const unidadesPorCaja = Number(p.unidadesPorCaja) || 1;
      const permiteSixpackTienda = esCajaProducto && !!p.manejaSixpack && !!p.mostrarSixpackEnTienda;
      const permiteSueltaTienda = esCajaProducto && !!p.permiteVentaSuelta && !!p.mostrarSueltaEnTienda;
      const opcionesModo = esCajaProducto
        ? [
            { valor: "caja", etiqueta: t("caja_completa", { n: unidadesPorCaja }), precio: p.precio, factor: unidadesPorCaja },
            permiteSixpackTienda ? { valor: "sixpack", etiqueta: t("six_pack", { n: p.unidadesPorSixpack }), precio: p.precioSixpack, factor: Number(p.unidadesPorSixpack) || 1 } : null,
            permiteSueltaTienda ? { valor: "suelta", etiqueta: t("unidad_suelta"), precio: p.precioUnidadSuelta, factor: 1 } : null
          ].filter(Boolean)
        : [];
      const modoActual = esCajaProducto ? (modoVentaSeleccionado[p.id] || "caja") : "caja";
      const factorModoActual = esCajaProducto ? (opcionesModo.find((o) => o.valor === modoActual) || opcionesModo[0]).factor : 1;

      const precioMostrado = conEnvase ? infoPrecio.precioCon : infoPrecio.precioSin;

      const sinStockModoActual = disponibleModoActual <= 0 || !tiendaAbierta;

                 </div>`

function renderDetalleProducto(id) {

  const permiteSixpackTienda = esCajaProducto && !!p.manejaSixpack && !!p.mostrarSixpackEnTienda;

    ? [
        { valor: "caja", etiqueta: `Caja completa (${unidadesPorCaja} uds)`, factor: unidadesPorCaja },
        permiteSixpackTienda ? { valor: "sixpack", etiqueta: `Six pack (${p.unidadesPorSixpack} uds)`, factor: Number(p.unidadesPorSixpack) || 1 } : null,
        permiteSueltaTienda ? { valor: "suelta", etiqueta: "Unidad suelta", factor: 1 } : null
      ].filter(Boolean)
    : [];
  const modoActual = esCajaProducto ? (modoVentaSeleccionado[id] || "caja") : "caja";
  const factorModoActual = esCajaProducto ? (opcionesModo.find((o) => o.valor === modoActual) || opcionesModo[0]).factor : 1;

  const infoPrecio = calcularPrecioInfo(p, modoActual);
  const precioMostrado = conEnvase ? infoPrecio.precioCon : infoPrecio.precioSin;

  const disponibleModoActual = esCajaProducto ? Math.floor(stockUnidades / factorModoActual) : stockUnidades;
  const sinStockModoActual = disponibleModoActual <= 0 || !tiendaAbierta;

  // Tabla resumen con TODAS las combinaciones de precio disponibles para este producto
  const filasPrecio = [];
  if (esCajaProducto) {
    const infoCaja = calcularPrecioInfo(p, "caja");
    filasPrecio.push([`Caja completa (${unidadesPorCaja} uds)${infoCaja.envaseAplica ? " — sin envase" : ""}`, infoCaja.precioSin]);
    if (infoCaja.envaseAplica) filasPrecio.push(["Caja completa — trayendo envases", infoCaja.precioCon]);
    if (permiteSixpackTienda) {
      const infoSix = calcularPrecioInfo(p, "sixpack");
      filasPrecio.push([`Six pack (${p.unidadesPorSixpack} uds)`, infoSix.precioSin]);
    }
    if (permiteSueltaTienda) {
      const infoSuelta = calcularPrecioInfo(p, "suelta");
      filasPrecio.push(["Unidad suelta", infoSuelta.precioSin]);
    }
  } else {
    filasPrecio.push([infoPrecio.envaseAplica ? "Sin envase" : "Precio", infoPrecio.precioSin]);
    if (infoPrecio.envaseAplica) filasPrecio.push(["Trayendo envase", infoPrecio.precioCon]);
  }

  const imgs = imagenesDe(p);
  const idxActivo = (imagenActiva[id] || 0) % Math.max(imgs.length, 1);
  const imgSrc = imgs.length ? imgs[idxActivo] : "https://placehold.co/500x350/FFF3CD/999999?text=Sin+imagen";

  detalleContenidoEl.innerHTML = `
    <div class="detalle-imagen-wrap" data-id="${id}">
      <img src="${imgSrc}" alt="${p.nombre}" />
      ${agotadoTotal ? `<span class="badge-agotado">Agotado</span>` : ""}
      ${
        imgs.length > 1
          ? `<div class="galeria-dots">${imgs
              .map((_, i) => `<span class="dot ${i === idxActivo ? "activo" : ""}" data-idx="${i}"></span>`)
              .join("")}</div>`
          : ""
      }
    </div>
    <div class="detalle-info">
      ${p.mostrarCategoria !== false ? `<span class="categoria">${p.categoria || ""}</span>` : ""}
      <h2 class="detalle-nombre">${p.nombre}</h2>
      <span class="precio">${formatCOPLocal(precioMostrado)}</span>

      <table class="tabla-precios-detalle">
        ${filasPrecio.map(([etiqueta, valor]) => `<tr><td>${etiqueta}</td><td>${formatCOPLocal(valor)}</td></tr>`).join("")}
      </table>

      ${
        opcionesModo.length > 1
          ? `<div class="selector-modo-venta" data-id="${id}">
               ${opcionesModo.map((op) => `<label><input type="radio" name="modo-detalle-${id}" value="${op.valor}" ${modoActual === op.valor ? "checked" : ""} /> ${op.etiqueta}</label>`).join("")}
             </div>`
          : ""
      }
      ${
        infoPrecio.envaseAplica
          ? `<div class="selector-envase" data-id="${id}">

               <label><input type="radio" name="envase-detalle-${id}" value="sin" ${!conEnvase ? "checked" : ""} /> Sin envase — ${formatCOPLocal(infoPrecio.precioSin)} <span class="nota-envase">(+${formatCOPLocal(Math.max(0, infoPrecio.precioSin - infoPrecio.precioCon))})</span></label>
             </div>`
          : ""
      }
      <span class="stock-info">${sinStockModoActual ? "Sin stock en este modo" : `Disponibles: ${disponibleModoActual} ${esCajaProducto ? (modoActual === "caja" ? "caja(s)" : modoActual === "sixpack" ? "six(es)" : "unidad(es)") : ""}`}</span>
      <button class="btn-agregar ${sinStockModoActual ? "agotado" : ""}" id="btn-agregar-detalle" data-id="${id}" ${sinStockModoActual ? "disabled" : ""}>
        ${!tiendaAbierta ? "Cerrado" : sinStockModoActual ? "Agotado" : "Agregar al pedido"}

  // Fotos: los puntos cambian de foto dentro del propio detalle (sin lightbox extra,
  // la foto ya se ve en tamaño grande dentro del modal).
  detalleContenidoEl.querySelectorAll(".galeria-dots .dot").forEach((dot) => {
    dot.addEventListener("click", (e) => {

  detalleContenidoEl.querySelectorAll(".selector-modo-venta input[type=radio]").forEach((radio) => {
    radio.addEventListener("change", (e) => {
      modoVentaSeleccionado[id] = e.target.value;
      renderDetalleProducto(id);

  detalleContenidoEl.querySelectorAll(".selector-envase input[type=radio]").forEach((radio) => {

  const btnAgregarDetalle = document.getElementById("btn-agregar-detalle");

/* ---------- CONFIGURACIÓN DE LA TIENDA: horario de atención + banner ---------- */
let configTienda = {};
let tiendaAbierta = true;

function horaActualBogota() {
  // Colombia no tiene horario de verano: siempre UTC-5. Usamos la zona horaria explícita
  // para que el horario funcione igual sin importar en qué zona esté el dispositivo del cliente.
  const partes = new Intl.DateTimeFormat("en-GB", {
    timeZone: "America/Bogota",
    hour: "2-digit",
    minute: "2-digit",
    hourCycle: "h23"
  }).formatToParts(new Date());
  const hora = Number(partes.find((p) => p.type === "hour").value);
  const minuto = Number(partes.find((p) => p.type === "minute").value);
  return hora * 60 + minuto;
}

function minutosDesdeTexto(txt) {
  const [h, m] = (txt || "00:00").split(":").map(Number);
  return (h || 0) * 60 + (m || 0);
}

function evaluarEstadoTienda() {
  const bannerEl = document.getElementById("banner-tienda");

  if (configTienda.horarioActivo) {
    const ahora = horaActualBogota();
    const apertura = minutosDesdeTexto(configTienda.horaApertura || "00:00");
    const cierre = minutosDesdeTexto(configTienda.horaCierre || "23:59");
    tiendaAbierta = apertura <= cierre ? ahora >= apertura && ahora < cierre : ahora >= apertura || ahora < cierre;
  } else {
    tiendaAbierta = true;
  }

  if (!tiendaAbierta) {
    bannerEl.className = "banner-tienda banner-cerrado";
    bannerEl.textContent = t("cerrado_banner", { hora: configTienda.horaApertura || "" });
  } else if (configTienda.bannerActivo && configTienda.bannerTexto) {
    bannerEl.className = "banner-tienda banner-promo";
    bannerEl.textContent = configTienda.bannerTexto;
  } else {
    bannerEl.className = "banner-tienda oculto-banner";
    bannerEl.textContent = "";
  }

  renderProductos();
  renderCombosTienda();
}

  aplicarEstiloVisual(configTienda.estiloVisual || "clasico");

/* Si el stock cambia mientras el producto está en el carrito, ajustamos cantidades */
function sincronizarCarritoConStock() {
  let cambiado = false;

  // El stock siempre se mide en UNIDADES. Cada item consume item.cantidad * factorConsumo unidades reales
  // (factorConsumo = unidadesPorCaja si es caja completa, 1 si es unidad suelta o producto normal).
  const unidadesUsadasPorProducto = {};

  carrito = carrito
    .map((item) => {
      const actual = productos.find((p) => p.id === item.id);
      if (!actual) return item;
      const stockUnidades = Number(actual.stock) || 0;
      if (stockUnidades <= 0) {
        cambiado = true;
        return null;
      }
      const factor = item.factorConsumo || 1;
      const usadoPrevio = unidadesUsadasPorProducto[item.id] || 0;
      const disponibleUnidades = stockUnidades - usadoPrevio;
      const maxCantidad = Math.floor(disponibleUnidades / factor);
      if (item.cantidad > maxCantidad) {
        item.cantidad = Math.max(0, maxCantidad);
        cambiado = true;
      }
      unidadesUsadasPorProducto[item.id] = usadoPrevio + item.cantidad * factor;
      return item.cantidad > 0 ? item : null;
    })
    .filter(Boolean);

  if (cambiado) {
    actualizarBadge();
    renderCarrito();
  }
}

/* ---------- CARRITO ---------- */
function maxComboDisponible(combo) {
  if (!combo.componentes || !combo.componentes.length) return 0;
  return Math.min(
    ...combo.componentes.map((c) => {
      const prod = productos.find((p) => p.id === c.productoId);
      if (!prod) return 0;
      return Math.floor((Number(prod.stock) || 0) / c.cantidad);
    })
  );
}

function agregarComboAlCarrito(idCombo) {
  if (!tiendaAbierta) return;
  const combo = combos.find((c) => c.id === idCombo);
  if (!combo) return;
  const key = "combo_" + idCombo;
  const max = maxComboDisponible(combo);
  const yaEnCarrito = carrito.find((i) => i.key === key);
  if ((yaEnCarrito ? yaEnCarrito.cantidad : 0) + 1 > max) return;

  if (yaEnCarrito) {
    yaEnCarrito.cantidad++;
  } else {
    carrito.push({
      key,
      id: idCombo,
      esCombo: true,
      nombre: combo.nombre,
      precio: combo.precio,
      cantidad: 1,
      conEnvase: null,
      modo: null
    });
  }
  actualizarBadge();
  renderCarrito();
}

function agregarAlCarrito(id) {
  if (!tiendaAbierta) return;
  const producto = productos.find((p) => p.id === id);
  const stockUnidades = Number(producto?.stock) || 0;
  if (!producto || stockUnidades <= 0) return;

  const esCajaProducto = !!producto.manejaCaja;
  const unidadesPorCaja = Number(producto.unidadesPorCaja) || 1;
  const unidadesPorSixpack = Number(producto.unidadesPorSixpack) || 1;
  const modoActual = esCajaProducto ? (modoVentaSeleccionado[id] || "caja") : "caja";
  const factorConsumo = esCajaProducto
    ? modoActual === "caja"
      ? unidadesPorCaja
      : modoActual === "sixpack"
      ? unidadesPorSixpack
      : 1
    : 1;

  const infoPrecio = calcularPrecioInfo(producto, modoActual);
  const conEnvase = infoPrecio.envaseAplica ? !!envaseSeleccionado[id] : false;
  const precioUnit = conEnvase ? infoPrecio.precioCon : infoPrecio.precioSin;

  const key = id + (esCajaProducto ? "_" + infoPrecio.modo : "") + (conEnvase ? "_con" : "_sin");

  const unidadesUsadas = carrito
    .filter((i) => i.id === id)
    .reduce((acc, i) => acc + i.cantidad * (i.factorConsumo || 1), 0);
  if (unidadesUsadas + factorConsumo > stockUnidades) return; // sin stock suficiente

  const existente = carrito.find((i) => i.key === key);
  if (existente) {
    existente.cantidad++;
  } else {
    carrito.push({
      key,
      id,
      nombre: producto.nombre,
      precio: precioUnit,
      cantidad: 1,
      conEnvase: infoPrecio.envaseAplica ? conEnvase : null,
      modo: esCajaProducto ? infoPrecio.modo : null,
      unidadesPorCaja: esCajaProducto ? unidadesPorCaja : null,
      unidadesPorSixpack: esCajaProducto ? unidadesPorSixpack : null,
      factorConsumo
    });
  }
  actualizarBadge();
}

function actualizarBadge() {
  const totalItems = carrito.reduce((acc, i) => acc + i.cantidad, 0);
  badgeEl.textContent = totalItems;
}

function renderCarrito() {
  if (carrito.length === 0) {

  listaCarritoEl.innerHTML = carrito

            item.modo === "caja" ? ` <small style="color:#1565C0;">${t("caja_x", { n: item.unidadesPorCaja })}</small>` :
            item.modo === "sixpack" ? ` <small style="color:#1565C0;">${t("six_x", { n: item.unidadesPorSixpack })}</small>` :

          <small>${formatCOPLocal(item.precio)} ${t("cu")}</small>
          ${
            item.conEnvase !== null
              ? `<label style="display:flex;align-items:center;gap:5px;font-size:0.75rem;margin-top:4px;cursor:pointer;">
                   <input type="checkbox" class="chk-envase-carrito" data-key="${item.key}" ${item.conEnvase ? "checked" : ""} />
                   ${t("trae_envase_check")}
                 </label>`
              : ""
          }
        </div>
        <div class="cantidad-control">
          <button class="restar">−</button>
          <span>${item.cantidad}</span>
          <button class="sumar">+</button>
        </div>
      </div>`
    )
    .join("");

  listaCarritoEl.querySelectorAll(".chk-envase-carrito").forEach((chk) => {
    chk.addEventListener("change", () => {
      const item = carrito.find((i) => i.key === chk.dataset.key);
      if (!item) return;
      const producto = productos.find((p) => p.id === item.id);
      if (!producto) return;

      const infoPrecio = calcularPrecioInfo(producto, item.modo || "caja");
      const nuevoConEnvase = chk.checked;
      const nuevoPrecio = nuevoConEnvase ? infoPrecio.precioCon : infoPrecio.precioSin;
      const nuevaKey = item.id + (item.modo ? "_" + item.modo : "") + (nuevoConEnvase ? "_con" : "_sin");

      const hermana = carrito.find((i) => i.key === nuevaKey && i !== item);
      if (hermana) {
        // Ya existe una línea de este producto+modo con ese envase: se fusionan las cantidades
        hermana.cantidad += item.cantidad;
        carrito = carrito.filter((i) => i !== item);
      } else {
        item.conEnvase = nuevoConEnvase;
        item.precio = nuevoPrecio;
        item.key = nuevaKey;
      }
      actualizarBadge();
      renderCarrito();
    });
  });

  listaCarritoEl.querySelectorAll(".item-carrito").forEach((el) => {
    const key = el.dataset.key;
    el.querySelector(".sumar").addEventListener("click", () => {
      const item = carrito.find((i) => i.key === key);
      if (!item) return;
      if (item.esCombo) {
        const combo = combos.find((c) => c.id === item.id);
        if (combo && item.cantidad + 1 <= maxComboDisponible(combo)) item.cantidad++;
        actualizarBadge();
        renderCarrito();
        return;
      }
      const producto = productos.find((p) => p.id === item.id);
      const stockDisponible = Number(producto?.stock) || 0;
      const factor = item.factorConsumo || 1;
      const unidadesUsadas = carrito.filter((i) => i.id === item.id).reduce((acc, i) => acc + i.cantidad * (i.factorConsumo || 1), 0);
      if (unidadesUsadas + factor <= stockDisponible) item.cantidad++;
      actualizarBadge();
      renderCarrito();
    });
    el.querySelector(".restar").addEventListener("click", () => {
      const item = carrito.find((i) => i.key === key);
      if (item) item.cantidad--;
      carrito = carrito.filter((i) => i.cantidad > 0);
      actualizarBadge();
      renderCarrito();
    });
  });

  const total = carrito.reduce((acc, i) => acc + i.cantidad * i.precio, 0);
  totalCarritoEl.textContent = t("total") + formatCOPLocal(total);
}

/* ---------- COMPARTIR UBICACIÓN POR GOOGLE MAPS ---------- */
document.getElementById("btn-compartir-ubicacion").addEventListener("click", () => {
  const nota = document.getElementById("nota-ubicacion");
  if (!navigator.geolocation) {
    nota.textContent = t("geo_no_soportado");
    return;
  }
  nota.textContent = t("geo_obteniendo");
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const { latitude, longitude } = pos.coords;
      const link = `https://www.google.com/maps?q=${latitude},${longitude}`;
      document.getElementById("cliente-ubicacion-link").value = link;
      nota.innerHTML = t("geo_ok", { link: `<a href="${link}" target="_blank" rel="noopener">${t("geo_ok_link_texto")}</a>` });
    },
    () => {
      nota.textContent = t("geo_error");
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
});

/* ---------- ENVÍO POR WHATSAPP ---------- */
document.getElementById("form-cliente").addEventListener("submit", (e) => {
  e.preventDefault();
  if (!tiendaAbierta) {
    alert(t("alerta_cerrado"));
    return;
  }
  if (carrito.length === 0) {
    alert(t("alerta_carrito_vacio"));
    return;
  }

  const cliente = {
    nombre: document.getElementById("cliente-nombre").value.trim(),
    cedula: document.getElementById("cliente-cedula").value.trim(),
    correo: document.getElementById("cliente-correo").value.trim(),
    direccion: document.getElementById("cliente-direccion").value.trim(),
    ubicacionLink: document.getElementById("cliente-ubicacion-link").value.trim(),
    telefono: document.getElementById("cliente-telefono").value.trim(),
    nota: document.getElementById("cliente-nota").value.trim()
  };

  guardarDatosClienteGuardados({
    nombre: cliente.nombre,
    direccion: cliente.direccion,
    telefono: cliente.telefono,
    ubicacionLink: cliente.ubicacionLink
  });

  const url = generarLinkWhatsApp(carrito, cliente, NUMERO_WHATSAPP_NEGOCIO);
  window.open(url, "_blank");

  // Limpiar carrito después de enviar (los datos de contacto se mantienen para la próxima compra)
  carrito = [];
  actualizarBadge();
  renderCarrito();
  modalOverlay.classList.remove("abierto");
});

/* ---------------------------------------------------------------
   RECORDAR MIS DATOS (localStorage, sin necesidad de cuenta):
   guarda nombre/dirección/teléfono/ubicación tras el primer pedido
   y los usa para prellenar el formulario la próxima vez.
--------------------------------------------------------------- */
const CLAVE_DATOS_CLIENTE = "pf-datos-cliente";

function guardarDatosClienteGuardados(datos) {
  if (!datos.nombre && !datos.direccion && !datos.telefono) return;
  localStorage.setItem(CLAVE_DATOS_CLIENTE, JSON.stringify(datos));
}

function cargarDatosClienteGuardados() {
  let datos;
  try {
    datos = JSON.parse(localStorage.getItem(CLAVE_DATOS_CLIENTE) || "null");
  } catch {
    datos = null;
  }
  const btnOlvidar = document.getElementById("btn-olvidar-datos");
  if (!datos) {
    btnOlvidar.classList.add("oculto-banner");
    return;
  }
  document.getElementById("cliente-nombre").value = datos.nombre || "";
  document.getElementById("cliente-direccion").value = datos.direccion || "";
  document.getElementById("cliente-telefono").value = datos.telefono || "";
  if (datos.ubicacionLink) {
    document.getElementById("cliente-ubicacion-link").value = datos.ubicacionLink;
    document.getElementById("nota-ubicacion").innerHTML = t("geo_ok", {
      link: `<a href="${datos.ubicacionLink}" target="_blank" rel="noopener">${t("geo_ok_link_texto")}</a>`
    });
  }
  btnOlvidar.classList.remove("oculto-banner");
}

document.getElementById("btn-olvidar-datos").addEventListener("click", () => {
  localStorage.removeItem(CLAVE_DATOS_CLIENTE);
  document.getElementById("cliente-nombre").value = "";
  document.getElementById("cliente-direccion").value = "";
  document.getElementById("cliente-telefono").value = "";
  document.getElementById("cliente-ubicacion-link").value = "";
  document.getElementById("nota-ubicacion").textContent = "";
  document.getElementById("btn-olvidar-datos").classList.add("oculto-banner");
});

cargarDatosClienteGuardados();
